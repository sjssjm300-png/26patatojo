<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammonia Simulation - High Visibility</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #ffffff; }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 12px; min-width: 250px; z-index: 100;
            border: 1px solid #ddd;
        }
        button { 
            cursor: pointer; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            background: #f8f8f8; color: #333; font-weight: bold;
        }
        button:hover { background: #e0e0e0; }
        button.active { background: #ff4500; color: white; border: none; }
        label { font-size: 13px; color: #444; font-weight: 600; display: flex; justify-content: space-between; }
        #stats { font-size: 12px; color: #555; margin-top: 5px; background: #f0f0f0; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3 style="margin:0; font-size:16px; color:#ff4500;">🧪 암모니아 확산 시뮬레이션</h3>
    <button id="pauseBtn" onclick="togglePause()">⏯ 시뮬레이션 정지/재개</button>
    <button onclick="changeFanPos()">🌀 환풍기 위치 변경</button>
    <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
    <hr style="border:0; border-top:1px solid #ddd;">
    <label>암모니아 발생량 <span id="rateVal">5</span></label>
    <input type="range" id="spawnRate" min="0" max="30" value="5" oninput="document.getElementById('rateVal').innerText=this.value">
    <div id="stats">
        구조: 15m x 10m x 5m (3개 구역)<br>
        입자 수: <span id="pCount">0</span>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let isPaused = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // 배경색 흰색 고정

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 1. 공간 가이드라인
    const roomGeo = new THREE.BoxGeometry(15, 10, 5);
    const roomEdges = new THREE.EdgesGeometry(roomGeo);
    const roomLine = new THREE.LineSegments(roomEdges, new THREE.LineBasicMaterial({ color: 0x888888 }));
    scene.add(roomLine);

    // 칸막이 벽 생성 (두께감 부여)
    const wallMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.6 });
    const wallGeo = new THREE.BoxGeometry(0.2, 7, 5);
    
    const wall1 = new THREE.Mesh(wallGeo, wallMat);
    wall1.position.set(-2, -1.5, 0);
    const wall2 = new THREE.Mesh(wallGeo, wallMat);
    wall2.position.set(2, -1.5, 0);
    scene.add(wall1, wall2);
    
    const walls = [wall1, wall2];

    // 2. 장치 설정
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1, 16), new THREE.MeshPhongMaterial({ color: 0x666666 }));
        s.position.set((i - 1) * 4, -4.5, 0); // -4, 0, 4 위치
        scene.add(s);
        sources.push(s);
    }

    const fan = new THREE.Mesh(new THREE.CircleGeometry(0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide }));
    fan.position.set(0, 4.9, 0);
    fan.rotation.x = Math.PI / 2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 2.5), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(5, -4.8, 0);
    scene.add(carbon);

    // 인터페이스 기능
    window.togglePause = () => { isPaused = !isPaused; document.getElementById('pauseBtn').classList.toggle('active'); };
    window.changeFanPos = () => { fan.position.x = (fan.position.x + 5) % 15 - 7.5; };
    window.changeCarbonPos = () => { carbon.position.set((Math.random()-0.5)*12, -4.8, (Math.random()-0.5)*4); };

    // 조명 (흰 배경에서 물체를 보이게 함)
    const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
    light1.position.set(5, 10, 7.5);
    const light2 = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(light1, light2);

    camera.position.set(15, 8, 15);
    camera.lookAt(0, 0, 0);

    // 3. 입자 물리 (주황색 암모니아)
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 }); 

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        // 생성
        const rate = parseInt(document.getElementById('spawnRate').value);
        if(rate > 0) {
            sources.forEach(src => {
                if(Math.random() < rate/60) { // 생성량 조절
                    const p = new THREE.Mesh(pGeo, pMat.clone());
                    p.position.copy(src.position).add(new THREE.Vector3(0, 0.6, 0));
                    p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.03, 0.04 + Math.random()*0.04, (Math.random()-0.5)*0.03);
                    scene.add(p);
                    particles.push(p);
                }
            });
        }

        // 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.userData.vel.y += 0.0008; // 부력 가속도
            const nextPos = p.position.clone().add(p.userData.vel);

            // 벽 충돌 (간단한 바운더리 체크)
            let blocked = false;
            walls.forEach(w => {
                if (Math.abs(nextPos.x - w.position.x) < 0.2 && nextPos.y < 2) {
                    p.userData.vel.x *= -0.5;
                    blocked = true;
                }
            });

            if(!blocked) p.position.copy(nextPos);
            p.userData.vel.multiplyScalar(0.99); // 공기 저항

            // 환풍기 흡입
            if (p.position.distanceTo(fan.position) < 1.0) {
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // 소멸 (화면 밖)
            if (Math.abs(p.position.x) > 7.5 || p.position.y > 5 || Math.abs(p.position.z) > 2.5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        document.getElementById('pCount').innerText = particles.length;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
