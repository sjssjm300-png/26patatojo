<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammonia Gas Dynamics Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #050505; }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.92); padding: 20px;
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 12px; min-width: 240px; z-index: 100;
        }
        h3 { margin: 0 0 5px 0; font-size: 16px; color: #222; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        button { 
            cursor: pointer; padding: 10px; border: none; border-radius: 6px; 
            background: #222; color: white; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #444; }
        button.active { background: #e74c3c; }
        .btn-toggle { background: #27ae60; }
        label { font-size: 13px; color: #444; font-weight: 600; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #stats { font-size: 12px; color: #666; background: #eee; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3>암모니아 물리 시뮬레이션</h3>
    <div class="control-group">
        <button id="pauseBtn" class="btn-toggle" onclick="togglePause()">⏯ 시뮬레이션 정지/재개</button>
        <button onclick="changeSourcePos()">📍 발생기 위치 (3곳)</button>
        <button onclick="changeFanPos()">🌀 환풍기 위치 (3곳)</button>
        <button onclick="changeCarbonPos()">⬛ 활성탄 위치 (3곳)</button>
    </div>
    <hr style="border:0; border-top:1px solid #ccc;">
    <div class="control-group">
        <label>실시간 입자 생성량 <span id="rateVal">5</span></label>
        <input type="range" id="spawnRate" min="0" max="50" value="5" oninput="document.getElementById('rateVal').innerText=this.value">
        <label>공기 저항(확산계수) <span id="frictionVal">0.98</span></label>
        <input type="range" id="friction" min="90" max="100" value="98" oninput="document.getElementById('frictionVal').innerText=this.value/100">
    </div>
    <div id="stats">
        공간: 15m x 10m x 5m<br>
        현재 암모니아 입자 수: <span id="pCount">0</span>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. 기본 환경 설정 (15 x 10 x 5)
    let isPaused = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 화장실 외곽선 생성
    const roomGeo = new THREE.BoxGeometry(15, 10, 5);
    const roomMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.05, side: THREE.BackSide });
    const room = new THREE.Mesh(roomGeo, roomMat);
    scene.add(room);

    const edges = new THREE.EdgesGeometry(roomGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x666666 }));
    scene.add(line);

    // 2. 장치 설정
    // 발생기(변기 모형), 환풍기, 활성탄
    const source = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 1, 20), new THREE.MeshPhongMaterial({ color: 0xffffff }));
    const fan = new THREE.Mesh(new THREE.CircleGeometry(0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00ccff, side: THREE.DoubleSide }));
    const carbon = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 2), new THREE.MeshPhongMaterial({ color: 0x222222 }));
    scene.add(source, fan, carbon);

    // 좌표 설정 (바닥에서 4만큼 떨어진 위치 등 반영)
    const sPositions = [new THREE.Vector3(-4, -4.5, 0), new THREE.Vector3(0, -4.5, 0), new THREE.Vector3(4, -4.5, 0)];
    const fPositions = [new THREE.Vector3(6, 4.9, 2), new THREE.Vector3(-6, 4.9, -2), new THREE.Vector3(0, 4.9, 0)];
    const cPositions = [new THREE.Vector3(4, -4.9, 1), new THREE.Vector3(-4, -4.9, -1), new THREE.Vector3(0, -2, 0)];

    let si=0, fi=0, ci=0;
    source.position.copy(sPositions[0]);
    fan.position.copy(fPositions[0]);
    fan.rotation.x = Math.PI / 2;
    carbon.position.copy(cPositions[0]);

    // 인터페이스 함수
    window.togglePause = () => { isPaused = !isPaused; document.getElementById('pauseBtn').classList.toggle('active'); };
    window.changeSourcePos = () => { si = (si+1)%3; source.position.copy(sPositions[si]); };
    window.changeFanPos = () => { fi = (fi+1)%3; fan.position.copy(fPositions[fi]); };
    window.changeCarbonPos = () => { ci = (ci+1)%3; carbon.position.copy(cPositions[ci]); };

    // 조명
    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(0, 8, 0);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.set(15, 10, 15);
    camera.lookAt(0, 0, 0);

    // 3. 암모니아 입자 물리 시스템
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.08, 8, 8);
    
    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        // 생성 (개수 조절)
        const rate = parseInt(document.getElementById('spawnRate').value);
        for(let i=0; i<rate; i++) {
            const pMat = new THREE.MeshBasicMaterial({ 
                color: 0xadff2f, transparent: true, opacity: 0.6 
            });
            const p = new THREE.Mesh(pGeo, pMat);
            // 발생기 상단에서 생성
            p.position.set(
                source.position.x + (Math.random()-0.5), 
                source.position.y + 0.5, 
                source.position.z + (Math.random()-0.5)
            );
            // 초기 속도: 암모니아의 가벼운 특성(상승 기류) 반영
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.05, 0.02 + Math.random()*0.03, (Math.random()-0.5)*0.05);
            scene.add(p);
            particles.push(p);
        }

        const friction = parseFloat(document.getElementById('friction').value) / 100;

        // 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 1. 물리 법칙 적용
            // 부력 (상승 가속도): 암모니아는 공기보다 가벼움
            p.userData.vel.y += 0.0015; 
            // 확산 및 저항
            p.userData.vel.multiplyScalar(friction);
            p.position.add(p.userData.vel);

            // 2. 환풍기 영향 (공기 흐름)
            const distToFan = p.position.distanceTo(fan.position);
            if (distToFan < 3.0) {
                const pull = new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(0.02);
                p.userData.vel.add(pull);
            }
            if (distToFan < 0.7) { // 흡입 성공
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // 3. 활성탄 영향 (흡착 및 농도 구배 감소)
            if (p.position.distanceTo(carbon.position) < 1.5) {
                p.userData.vel.multiplyScalar(0.5);
                p.material.opacity -= 0.02;
                if(p.material.opacity <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
            }

            // 4. 경계 조건 (벽면 충돌 및 소멸)
            if (Math.abs(p.position.x) > 7.5 || p.position.y > 5 || p.position.y < -5 || Math.abs(p.position.z) > 2.5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        document.getElementById('pCount').innerText = particles.length;
        renderer.render(scene, camera);
    }
    animate();

    // 창 크기 조절 대응
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
