<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암모니아 확산 및 흡착 공학 시뮬레이션</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #2ecc71; border-bottom: 2px solid #333; padding-bottom: 15px; }
        
        .simulation-area { display: flex; gap: 20px; margin: 20px 0; }
        .chamber { flex: 1; height: 300px; border: 3px solid #555; position: relative; overflow: hidden; background: #000; border-radius: 10px; }
        
        /* 암모니아 입자 시각화 */
        .particle { position: absolute; width: 4px; height: 4px; background: rgba(46, 204, 113, 0.6); border-radius: 50%; }
        
        /* 출입구 가시화 */
        #gate { position: absolute; right: 0; top: 40%; width: 10px; height: 60px; background: #e74c3c; transition: 0.5s; z-index: 10; }
        .gate-open { transform: translateY(-100%); opacity: 0.3; }

        .dashboard { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #3d3d3d; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #bbb; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 5px 0; color: #2ecc71; }

        .controls { margin-top: 20px; text-align: center; background: #333; padding: 20px; border-radius: 10px; }
        button { padding: 10px 25px; font-size: 15px; cursor: pointer; border: none; border-radius: 5px; margin: 0 10px; transition: 0.3s; font-weight: bold; }
        .btn-inject { background: #2ecc71; color: white; }
        .btn-gate { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ammonia Diffusion & Adsorption Simulation</h2>
    
    <div class="simulation-area">
        <div class="chamber" id="chamber">
            <div id="gate"></div>
            <div id="particles-container"></div>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <h3>현재 농도 (ppm)</h3>
                <p id="ppmVal">0</p>
            </div>
            <div class="stat-card">
                <h3>확산 속도 (Flux)</h3>
                <p id="fluxVal">0.0</p>
            </div>
            <div class="stat-card">
                <h3>흡착제 포화도</h3>
                <p id="satVal">0%</p>
            </div>
            <div class="stat-card">
                <h3>출입구 상태</h3>
                <p id="statusVal">CLOSED</p>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-inject" onclick="injectAmmonia()">암모니아 투입 (농도 구배 형성)</button>
        <button class="btn-gate" onclick="toggleGate()">출입구 열기/닫기</button>
        <button class="btn-reset" onclick="resetSim()">초기화</button>
    </div>
</div>

<script>
    let particles = [];
    let isGateOpen = false;
    let concentration = 0;
    let adsorptionRate = 0.05; // 흡착 효율 (탄산칼륨 처리 시 수치 증가)

    function injectAmmonia() {
        for(let i=0; i<100; i++) {
            createParticle(true); // 왼쪽 하단(발생원)에서 생성
        }
    }

    function createParticle(fromSource) {
        const p = {
            x: fromSource ? Math.random() * 50 : Math.random() * 350,
            y: fromSource ? 250 + Math.random() * 50 : Math.random() * 300,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4 - 1 // 암모니아는 가벼워서 기본적으로 위로 뜸(부력)
        };
        particles.push(p);
    }

    function toggleGate() {
        isGateOpen = !isGateOpen;
        document.getElementById('gate').className = isGateOpen ? 'gate-open' : '';
        document.getElementById('statusVal').innerText = isGateOpen ? 'OPEN' : 'CLOSED';
    }

    function resetSim() {
        particles = [];
        concentration = 0;
        isGateOpen = false;
        document.getElementById('gate').className = '';
        document.getElementById('statusVal').innerText = 'CLOSED';
    }

    function update() {
        const container = document.getElementById('particles-container');
        container.innerHTML = '';
        
        // 농도 구배 및 물리 법칙 적용
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;

            // 벽 충돌 및 부력 효과
            if (p.x < 0 || p.x > 390) p.vx *= -1;
            if (p.y < 0) p.vy *= -1; 
            if (p.y > 300) p.vy *= -1;

            // 출입구 확산 (Fick's Law 시뮬레이션)
            if (isGateOpen && p.x > 380 && p.y > 120 && p.y < 180) {
                particles.splice(index, 1); // 밖으로 확산되어 나감
                return;
            }

            // 상단 흡착제에 의한 흡착 (화학적 흡착 시뮬레이션)
            if (p.y < 20 && Math.random() < adsorptionRate) {
                particles.splice(index, 1);
                return;
            }

            // 그리기
            const div = document.createElement('div');
            div.className = 'particle';
            div.style.left = p.x + 'px';
            div.style.top = p.y + 'px';
            container.appendChild(div);
        });

        // 데이터 갱신
        concentration = particles.length;
        document.getElementById('ppmVal').innerText = (concentration * 1.5).toFixed(0);
        document.getElementById('fluxVal').innerText = isGateOpen ? (Math.random() * 5 + 5).toFixed(1) : "0.0";
        document.getElementById('satVal').innerText = Math.min(100, (100 - concentration/2)).toFixed(0) + "%";

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
