<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암모니아 확산 시뮬레이션</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.8); padding: 15px;
            border-radius: 10px; display: flex; flex-direction: column; gap: 10px;
        }
        button { cursor: pointer; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button:hover { background: #eee; }
    </style>
</head>
<body>

<div id="ui-panel">
    <strong>시뮬레이션 컨트롤</strong>
    <button onclick="changeSourcePos()">📍 발생장치 위치 변경</button>
    <button onclick="changeFanPos()">🌀 환풍기 위치 변경</button>
    <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
    <label>입자 생성량: <input type="range" id="spawnRate" min="0" max="10" value="2"></label>
</div>

<!-- Three.js 라이브러리 로드 -->
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. 기본 씬 설정
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. 화장실 모형 (투명한 박스)
    const roomGeo = new THREE.BoxGeometry(10, 8, 10);
    const roomMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.2, side: THREE.BackSide });
    const room = new THREE.Mesh(roomGeo, roomMat);
    scene.add(room);

    const edges = new THREE.EdgesGeometry(roomGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
    scene.add(line);

    // 3. 장치 모델 및 위치 데이터
    const source = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    const fan = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 0.2), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
    const carbon = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshBasicMaterial({ color: 0x333333 }));
    scene.add(source, fan, carbon);

    const positions = [
        new THREE.Vector3(-4, -3.5, 0), new THREE.Vector3(0, -3.5, 0), new THREE.Vector3(4, -3.5, 0),
        new THREE.Vector3(0, 3.5, 4), new THREE.Vector3(0, 3.5, -4), new THREE.Vector3(4, 3.5, 0)
    ];

    let sIdx = 0, fIdx = 3, cIdx = 1;
    window.changeSourcePos = () => source.pos.copy(positions[(++sIdx)%3]); // 하단 3곳
    window.changeFanPos = () => fan.position.copy(positions[3 + (++fIdx)%3]); // 상단 3곳
    window.changeCarbonPos = () => carbon.position.set(Math.random()*6-3, -3.5, Math.random()*6-3);

    // 초기 위치 설정
    source.position.copy(positions[0]);
    fan.position.copy(positions[3]);
    carbon.position.copy(positions[1]);

    // 조명
    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(5, 5, 5);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.set(12, 8, 12);
    camera.lookAt(0, 0, 0);

    // 4. 암모니아 입자 시스템
    const particles = [];
    const particleGeo = new THREE.SphereGeometry(0.05);
    const particleMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });

    function animate() {
        requestAnimationFrame(animate);

        // 입자 생성
        const rate = document.getElementById('spawnRate').value;
        for(let i=0; i<rate; i++) {
            const p = new THREE.Mesh(particleGeo, particleMat);
            p.position.copy(source.position);
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.1, Math.random()*0.1, (Math.random()-0.5)*0.1);
            scene.add(p);
            particles.push(p);
        }

        // 입자 이동 및 처리
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.position.add(p.userData.vel);

            // 1. 환풍기 흡입 (제거)
            if (p.position.distanceTo(fan.position) < 1.0) {
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // 2. 활성탄 접촉 (감속/흡착 시뮬레이션)
            if (Math.abs(p.position.x - carbon.position.x) < 1 && Math.abs(p.position.y - carbon.position.y) < 0.3) {
                p.userData.vel.multiplyScalar(0.8); 
            }

            // 3. 벽면 충돌 및 수명 제한
            if (Math.abs(p.position.x) > 5 || Math.abs(p.position.y) > 4 || Math.abs(p.position.z) > 5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
