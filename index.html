<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Ammonia Physics Simulation Lab</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #111; color: #eee; }
        #canvas-container { flex: 1; position: relative; }
        
        /* 우측 데이터 패널 */
        #data-panel { 
            width: 350px; background: #1e1e1e; border-left: 1px solid #333; 
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; box-shadow: -10px 0 20px rgba(0,0,0,0.5);
        }

        /* 좌측 상단 제어 패널 */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(30, 30, 30, 0.85); padding: 20px;
            border-radius: 15px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 15px; width: 280px;
            backdrop-filter: blur(10px);
        }

        .input-group { display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-size: 13px; color: #bbb; }
        input[type="number"] { 
            width: 70px; padding: 6px; border: 1px solid #555; border-radius: 5px; 
            background: #000; color: #00ffcc; font-size: 14px; text-align: center;
        }

        button { 
            cursor: pointer; padding: 10px; border: none; border-radius: 8px; 
            background: #3a3a3a; color: white; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #555; transform: translateY(-2px); }
        .reset-btn { background: #662222; margin-top: 10px; }
        .reset-btn:hover { background: #883333; }

        /* 그래프 디자인 */
        .chart-box { background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; }
        canvas.chart-canvas { width: 100%; height: 120px; margin-top: 10px; }
        .stat-label { font-size: 12px; color: #888; display: flex; justify-content: space-between; }
        .highlight { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <h2 style="margin:0 0 10px 0; color:#00ffcc; font-size:18px;">🧪 3D Gas Lab</h2>
        
        <div class="input-group">
            <label>암모니아 발생량 (0-100)</label>
            <input type="number" id="spawnRate" value="45" min="0" max="100">
        </div>

        <div class="input-group">
            <label>🌀 환풍구 흡입력 (0-50)</label>
            <input type="number" id="fanPower" value="15" min="0" max="50">
        </div>

        <div class="input-group">
            <label>⬛ 활성탄 흡착 확률 (%)</label>
            <input type="number" id="carbEff" value="65" min="0" max="100">
        </div>

        <button onclick="changeFanPos()">🌀 환풍구 위치 이동</button>
        <button class="reset-btn" onclick="resetSim()">🔄 시뮬레이션 초기화</button>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:20px;">실시간 분석</h3>
    
    <div class="chart-box">
        <div class="stat-label">잔류 농도: <span id="particleCount" class="highlight">0</span> particles</div>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-box">
        <div class="stat-label">누적 제거량 비교</div>
        <div class="stat-label" style="margin-top:10px;">환풍구 배출: <span id="fanCount" style="color:#00aaff">0</span></div>
        <div class="stat-label">활성탄 흡착: <span id="carbCount" style="color:#ffffff">0</span></div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Scene Setup ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    let particles = [];
    let removedByFan = 0, removedByCarbon = 0;

    // --- Lighting ---
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.4));

    // --- 3D Room ---
    const roomSize = { x: 20, y: 10, z: 15 };
    const roomGeo = new THREE.BoxGeometry(roomSize.x, roomSize.y, roomSize.z);
    const roomEdge = new THREE.LineSegments(
        new THREE.EdgesGeometry(roomGeo), 
        new THREE.LineBasicMaterial({ color: 0x666666 })
    );
    scene.add(roomEdge);

    // Floor Grid
    const grid = new THREE.GridHelper(20, 10, 0x444444, 0x222222);
    grid.position.y = -5;
    scene.add(grid);

    // --- Removal Devices ---
    // Fan (Circular Wall Vent)
    const fan = new THREE.Mesh(
        new THREE.CircleGeometry(1.2, 32), 
        new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide })
    );
    const fanPositions = [
        { pos: [-9.95, 3, 0], rot: [0, Math.PI/2, 0] },
        { pos: [9.95, 3, 0], rot: [0, -Math.PI/2, 0] },
        { pos: [0, 3, -7.45], rot: [0, 0, 0] }
    ];
    let fanIdx = 0;
    const updateFan = () => {
        fan.position.set(...fanPositions[fanIdx].pos);
        fan.rotation.set(...fanPositions[fanIdx].rot);
    };
    updateFan(); scene.add(fan);
    window.changeFanPos = () => { fanIdx = (fanIdx + 1) % 3; updateFan(); };

    // Carbon Filter (Ceiling Activated Carbon)
    const carbon = new THREE.Mesh(
        new THREE.BoxGeometry(6, 0.3, 6), 
        new THREE.MeshPhongMaterial({ color: 0x333333 })
    );
    carbon.position.set(4, 4.8, -2);
    scene.add(carbon);

    // --- 3 Ammonia Generators ---
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(
            new THREE.CylinderGeometry(0.6, 0.8, 0.8, 16), 
            new THREE.MeshPhongMaterial({ color: 0x777777 })
        );
        s.position.set((i-1)*6, -4.6, 4);
        scene.add(s);
        sources.push(s);
    }

    camera.position.set(20, 15, 20);
    camera.lookAt(0, 0, 0);

    // --- Charts ---
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(60).fill(0);

    function updateCharts() {
        document.getElementById('particleCount').innerText = particles.length;
        document.getElementById('fanCount').innerText = removedByFan;
        document.getElementById('carbCount').innerText = removedByCarbon;

        concCtx.clearRect(0, 0, 320, 120);
        concCtx.beginPath(); concCtx.strokeStyle = '#00ffcc'; concCtx.lineWidth = 2;
        history.push(particles.length); history.shift();
        for(let i=0; i<60; i++) {
            let x = (i/60)*320, y = 120 - (history[i]/1000)*120;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        effCtx.clearRect(0, 0, 320, 120);
        const max = Math.max(removedByFan, removedByCarbon, 1);
        effCtx.fillStyle = '#00aaff'; effCtx.fillRect(70, 120, 50, -(removedByFan/max)*100);
        effCtx.fillStyle = '#666666'; effCtx.fillRect(180, 120, 50, -(removedByCarbon/max)*100);
    }

    // --- Particle Engine ---
    const pGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.6 });

    function animate() {
        requestAnimationFrame(animate);

        const spawnRate = parseFloat(document.getElementById('spawnRate').value);
        const fanPower = parseFloat(document.getElementById('fanPower').value) * 0.001;
        const carbEff = parseFloat(document.getElementById('carbEff').value) / 100;

        // Create Particles
        sources.forEach(src => {
            if(Math.random() < spawnRate/100) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.6, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.15, 0.05, (Math.random()-0.5)*0.15);
                scene.add(p);
                particles.push(p);
            }
        });

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const vel = p.userData.vel;

            // 1. Fan Suction
            const distFan = p.position.distanceTo(fan.position);
            if(distFan < 9) {
                const pull = new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(fanPower * (9/distFan));
                vel.add(pull);
            }
            if(distFan < 1.0) {
                removedByFan++; scene.remove(p); particles.splice(i, 1); continue;
            }

            // 2. Carbon Adsorption
            const distCarb = p.position.distanceTo(carbon.position);
            if(distCarb < 3.0 && Math.random() < carbEff * 0.15) {
                p.material.opacity -= 0.1;
                vel.multiplyScalar(0.4);
                if(p.material.opacity <= 0) {
                    removedByCarbon++; scene.remove(p); particles.splice(i, 1); continue;
                }
            }

            // 3. Physics (Ammonia is lighter than air -> Buoyancy)
            vel.y += 0.0025; // Constant upward drift
            vel.x += (Math.random()-0.5)*0.015; // Random diffusion
            vel.z += (Math.random()-0.5)*0.015;
            p.position.add(vel);
            vel.multiplyScalar(0.985); // Air resistance

            // 4. Boundary Collision
            const lx = roomSize.x/2 - 0.2, ly = roomSize.y/2 - 0.2, lz = roomSize.z/2 - 0.2;
            if(Math.abs(p.position.x) > lx) { vel.x *= -0.7; p.position.x = Math.sign(p.position.x)*lx; }
            if(Math.abs(p.position.y) > ly) { vel.y *= -0.7; p.position.y = Math.sign(p.position.y)*ly; }
            if(Math.abs(p.position.z) > lz) { vel.z *= -0.7; p.position.z = Math.sign(p.position.z)*lz; }
        }

        updateCharts();
        renderer.render(scene, camera);
    }

    window.resetSim = () => {
        particles.forEach(p => scene.remove(p));
        particles = []; removedByFan = 0; removedByCarbon = 0;
        history.fill(0);
    };

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, window.innerHeight);
    });
</script>
</body>
</html>
