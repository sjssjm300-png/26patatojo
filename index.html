<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Real-time Ammonia Diffusion Analysis</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #ffffff; color: #333; }
        #canvas-container { flex: 1; position: relative; }
        #data-panel { 
            width: 360px; background: #fdfdfd; border-left: 1px solid #eee; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 18px;
            border-radius: 12px; border: 1px solid #ddd;
            display: flex; flex-direction: column; gap: 8px; width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 100;
        }
        .input-group { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
        input[type="number"] { width: 50px; padding: 3px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .btn-loc { cursor: pointer; padding: 6px; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-size: 11px; margin-bottom: 2px; width: 100%; text-align: left;}
        .active-loc { background: #e3f2fd; border-color: #2196f3; color: #1976d2; font-weight: bold; }
        .monitor-card { background: #fff; border: 1px solid #f0f0f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .ppm-display { font-size: 32px; font-weight: 800; color: #d32f2f; }
        canvas.chart-canvas { width: 100%; height: 80px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-size:15px;">🧪 물리 엔진 변인 제어</h3>
        <div class="input-group">발생량 <input type="number" id="spawnRate" value="40"></div>
        <div class="input-group">환풍기 위력 <input type="number" id="fanPower" value="15"></div>
        <div class="input-group">활성탄 효율 (%) <input type="number" id="carbEff" value="70"></div>
        <div style="margin-top:10px;">
            <p style="font-size:11px; font-weight:bold; color:#1976d2; margin-bottom:5px;">⬛ 활성탄 필터 위치</p>
            <button id="loc0" class="btn-loc" onclick="setCarbonPos(0)">📍 발생원 상단 벽면</button>
            <button id="loc1" class="btn-loc" onclick="setCarbonPos(1)">📍 환풍기 맞은편 벽면</button>
            <button id="loc2" class="btn-loc active-loc" onclick="setCarbonPos(2)">📍 환풍구 바로 옆 (천장)</button>
        </div>
        <button onclick="resetSim()" style="width:100%; padding:8px; margin-top:5px; background:#fff; border:1px solid #ddd; cursor:pointer; border-radius:5px; font-size:11px;">🔄 데이터 초기화</button>
    </div>
</div>

<div id="data-panel">
    <h2 style="margin:0; font-size:18px;">분석 리포트</h2>
    <div class="monitor-card">
        <div style="font-size:12px; color:#666;">실시간 농도 (PPM)</div>
        <div class="ppm-display" id="ppmVal">0.0</div>
        <canvas id="ppmChart" class="chart-canvas"></canvas>
    </div>
    <div class="monitor-card">
        <div style="font-size:12px; color:#666;">제거 기여도 (%)</div>
        <div style="display:flex; height:10px; border-radius:5px; overflow:hidden; margin:10px 0;">
            <div id="bar-fan" style="background:#03a9f4; width:50%;"></div>
            <div id="bar-carb" style="background:#444; width:50%;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px;">
            <span>🌀 환풍구: <b id="perc-fan">50</b>%</span>
            <span>⬛ 활성탄: <b id="perc-carb">50</b>%</span>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let particles = [];
    let removedByFan = 0, removedByCarbon = 0;

    // --- 환경 구성 ---
    const roomSize = { x: 20, y: 10, z: 15 };
    const roomEdge = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(20,10,15)), new THREE.LineBasicMaterial({ color: 0xeeeeee }));
    scene.add(roomEdge);

    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 7, 10), new THREE.MeshPhongMaterial({ color: 0xf5f5f5, transparent: true, opacity: 0.3 }));
    wall.position.set(0, -1.5, 0);
    scene.add(wall);

    const fan = new THREE.Mesh(new THREE.CircleGeometry(1.2, 32), new THREE.MeshBasicMaterial({ color: 0x03a9f4, side: THREE.DoubleSide }));
    fan.position.set(-9.95, 3.5, 0); fan.rotation.y = Math.PI/2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 5), new THREE.MeshPhongMaterial({ color: 0x444444 }));
    const carbLocs = [new THREE.Vector3(7, 3, 5), new THREE.Vector3(9.8, 0, 0), new THREE.Vector3(-8, 4.8, 0)];
    window.setCarbonPos = (i) => {
        carbon.position.copy(carbLocs[i]);
        carbon.rotation.z = (i===1) ? Math.PI/2 : 0;
        for(let n=0; n<3; n++) document.getElementById(`loc${n}`).className = (n===i) ? 'btn-loc active-loc' : 'btn-loc';
    };
    setCarbonPos(2); scene.add(carbon);

    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.3, 16), new THREE.MeshPhongMaterial({ color: 0xdddddd }));
        s.position.set(7, -4.8, (i-1)*5);
        scene.add(s); sources.push(s);
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.9), new THREE.DirectionalLight(0xffffff, 0.3).set(5,10,5));
    camera.position.set(22, 14, 22); camera.lookAt(0,0,0);

    const ppmCtx = document.getElementById('ppmChart').getContext('2d');
    let ppmHistory = new Array(60).fill(0);

    function updateStats() {
        const currentPPM = (particles.length * 0.04).toFixed(1);
        document.getElementById('ppmVal').innerText = currentPPM;
        const total = removedByFan + removedByCarbon || 1;
        const fP = Math.round((removedByFan/total)*100);
        document.getElementById('bar-fan').style.width = fP + "%";
        document.getElementById('bar-carb').style.width = (100-fP) + "%";
        document.getElementById('perc-fan').innerText = fP;
        document.getElementById('perc-carb').innerText = 100-fP;

        ppmCtx.clearRect(0,0,320,80);
        ppmCtx.beginPath(); ppmCtx.strokeStyle = '#d32f2f'; ppmCtx.lineWidth = 2;
        ppmHistory.push(currentPPM); ppmHistory.shift();
        for(let i=0; i<60; i++){
            let x = (i/60)*320, y = 80 - (ppmHistory[i]/40)*80;
            if(i===0) ppmCtx.moveTo(x,y); else ppmCtx.lineTo(x,y);
        }
        ppmCtx.stroke();
    }

    const pGeo = new THREE.SphereGeometry(0.1, 6, 6);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffbb33, transparent: true, opacity: 0.5 });

    function animate() {
        requestAnimationFrame(animate);
        const spawn = parseFloat(document.getElementById('spawnRate').value);
        const fPow = parseFloat(document.getElementById('fanPower').value) * 0.0008; // 인력 최적화
        const cEff = parseFloat(document.getElementById('carbEff').value) / 100;

        if(Math.random() < spawn/100) {
            const s = sources[Math.floor(Math.random()*3)];
            const p = new THREE.Mesh(pGeo, pMat.clone());
            p.position.copy(s.position).add(new THREE.Vector3(0,0.5,0));
            // 초기 속도 확산성 강화 (골고루 퍼지게)
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.3, 0.05, (Math.random()-0.5)*0.3);
            scene.add(p); particles.push(p);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]; const v = p.userData.vel;
            
            // 1. 제거 로직
            if(p.position.distanceTo(fan.position) < 1.0) { removedByFan++; scene.remove(p); particles.splice(i,1); continue; }
            if(p.position.distanceTo(carbon.position) < 2.5 && Math.random() < cEff*0.08) {
                p.material.opacity -= 0.15;
                if(p.material.opacity <= 0) { removedByCarbon++; scene.remove(p); particles.splice(i,1); continue; }
            }

            // 2. 부력 및 랜덤 확산 (더욱 골고루 퍼지도록 수정)
            v.y += 0.0012; // 부력을 낮춰 천장 정체 완화
            v.x += (Math.random()-0.5)*0.025; 
            v.z += (Math.random()-0.5)*0.025;
            
            // 3. 환풍기 인력
            const dFan = p.position.distanceTo(fan.position);
            if(dFan < 8) v.add(new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(fPow));
            
            p.position.add(v);
            v.multiplyScalar(0.97); // 공기 저항 (속도 감쇠) 강화 -> 탄성 느낌 제거

            // 4. 벽 충돌 (탄성 계수 대폭 하향)
            const lx=9.8, ly=4.8, lz=7.3;
            if(Math.abs(p.position.x)>lx) { v.x *= -0.3; p.position.x=Math.sign(p.position.x)*lx; } // 튕김 0.8 -> 0.3
            if(Math.abs(p.position.y)>ly) { v.y *= -0.3; p.position.y=Math.sign(p.position.y)*ly; }
            if(Math.abs(p.position.z)>lz) { v.z *= -0.3; p.position.z=Math.sign(p.position.z)*lz; }
            
            const wallBox = new THREE.Box3().setFromObject(wall);
            if(wallBox.containsPoint(p.position)) { v.x *= -0.3; p.position.x += v.x*2; }
        }
        updateStats();
        renderer.render(scene, camera);
    }

    window.resetSim = () => {
        particles.forEach(p => scene.remove(p)); particles = [];
        removedByFan = 0; removedByCarbon = 0; ppmHistory.fill(0);
    };

    animate();
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, window.innerHeight);
    });
</script>
</body>
</html>
