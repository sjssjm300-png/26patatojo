<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ammonia Sim Fix</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; display: flex; background: #fff; }
        #canvas-container { flex: 1; position: relative; height: 100vh; background: #eee; }
        #data-panel { width: 300px; padding: 20px; background: #f8f9fa; border-left: 1px solid #ddd; }
        #ui-panel { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #ccc; font-size: 13px; }
        .ppm-box { font-size: 24px; color: red; font-weight: bold; margin: 10px 0; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <strong>⚙️ 시뮬레이션 설정</strong><br><br>
        발생량: <input type="number" id="spawnRate" value="40" style="width:40px"><br>
        환풍기: <input type="number" id="fanPower" value="15" style="width:40px"><br><br>
        <button onclick="setPos(0)">위치 1 (벽)</button>
        <button onclick="setPos(2)">위치 2 (천장)</button>
    </div>
</div>

<div id="data-panel">
    <h3>📊 실시간 데이터</h3>
    <div class="ppm-box"><span id="ppmVal">0.0</span> PPM</div>
    <div style="width:100%; height:20px; background:#ddd; border-radius:10px; overflow:hidden;">
        <div id="bar-fan" style="width:50%; height:100%; background:#03a9f4; float:left;"></div>
        <div id="bar-carb" style="width:50%; height:100%; background:#444; float:left;"></div>
    </div>
    <p style="font-size:12px;">파랑: 환풍기 / 검정: 활성탄</p>
</div>

<!-- Three.js 라이브러리를 가장 안전한 방식으로 불러옵니다 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // 페이지 로딩 확인용
    console.log("시뮬레이션 시작 중...");

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // 환경 구성
    const room = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(20, 10, 15)),
        new THREE.LineBasicMaterial({ color: 0xcccccc })
    );
    scene.add(room);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const fan = new THREE.Mesh(new THREE.CircleGeometry(1, 32), new THREE.MeshBasicMaterial({ color: 0x03a9f4, side: THREE.DoubleSide }));
    fan.position.set(-9.9, 3, 0); fan.rotation.y = Math.PI/2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(7, 4.8, 0);
    scene.add(carbon);

    window.setPos = (i) => {
        if(i === 0) carbon.position.set(7, -2, 5);
        else carbon.position.set(-8, 4.8, 0);
    };

    camera.position.set(20, 12, 20);
    camera.lookAt(0, 0, 0);

    let particles = [];
    let fCount = 0, cCount = 0;

    function animate() {
        requestAnimationFrame(animate);

        // 입자 생성
        if(Math.random() < document.getElementById('spawnRate').value / 100) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
            p.position.set(7, -4.8, 0);
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.2, 0.05, (Math.random()-0.5)*0.2);
            scene.add(p);
            particles.push(p);
        }

        // 입자 물리 계산
        for(let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const v = p.userData.vel;

            v.y += 0.001; // 부력
            p.position.add(v);
            v.multiplyScalar(0.98); // 공기 저항

            // 제거 체크
            if(p.position.distanceTo(fan.position) < 1.2) {
                fCount++; scene.remove(p); particles.splice(i, 1); continue;
            }
            if(p.position.distanceTo(carbon.position) < 2) {
                cCount++; scene.remove(p); particles.splice(i, 1); continue;
            }

            // 벽 충돌
            if(Math.abs(p.position.x) > 9.8) v.x *= -0.3;
            if(Math.abs(p.position.y) > 4.8) v.y *= -0.3;
            if(Math.abs(p.position.z) > 7.3) v.z *= -0.3;
        }

        // 데이터 업데이트
        document.getElementById('ppmVal').innerText = (particles.length * 0.1).toFixed(1);
        const total = fCount + cCount || 1;
        document.getElementById('bar-fan').style.width = (fCount/total*100) + "%";
        document.getElementById('bar-carb').style.width = (cCount/total*100) + "%";

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
