<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Ammonia Physics Simulation - Advanced</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #ffffff; color: #333; }
        #canvas-container { flex: 1; position: relative; }
        
        /* 우측 데이터 패널 */
        #data-panel { 
            width: 350px; background: #fdfdfd; border-left: 1px solid #e0e0e0; 
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.05);
        }

        /* 좌측 상단 제어 패널 */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 20px;
            border-radius: 15px; border: 1px solid #ddd;
            display: flex; flex-direction: column; gap: 12px; width: 280px;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .input-group { display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-size: 12px; color: #555; font-weight: 600; }
        input[type="number"] { 
            width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 5px; 
            background: #fff; color: #d32f2f; font-size: 13px; text-align: center;
        }

        .btn-group { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
        button { 
            cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 6px; 
            background: #fff; color: #333; font-weight: bold; font-size: 12px; transition: 0.2s;
        }
        button:hover { background: #f5f5f5; border-color: #bbb; }
        .active-btn { background: #e3f2fd; border-color: #2196f3; color: #1976d2; }
        .reset-btn { background: #fff5f5; color: #c62828; border-color: #ffcdd2; margin-top: 5px; }

        /* 그래프 디자인 */
        .chart-box { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; }
        canvas.chart-canvas { width: 100%; height: 100px; margin-top: 10px; border-top: 1px solid #f0f0f0; }
        .stat-label { font-size: 11px; color: #666; display: flex; justify-content: space-between; }
        .highlight { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <h2 style="margin:0 0 5px 0; color:#333; font-size:16px;">🧪 환경 변인 통제 실험</h2>
        
        <div class="input-group">
            <label>발생량 (0-100)</label>
            <input type="number" id="spawnRate" value="40" min="0" max="100">
        </div>
        <div class="input-group">
            <label>환풍구 흡입력 (0-50)</label>
            <input type="number" id="fanPower" value="15" min="0" max="50">
        </div>
        <div class="input-group">
            <label>활성탄 흡착 효율 (%)</label>
            <input type="number" id="carbEff" value="70" min="0" max="100">
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        
        <label style="font-size:12px; font-weight:bold; color:#1976d2;">⬛ 활성탄 위치 설정</label>
        <div class="btn-group">
            <button id="btn-carb-0" onclick="setCarbonPos(0)">1. 발생원 쪽 벽 (하단)</button>
            <button id="btn-carb-1" onclick="setCarbonPos(1)">2. 환풍기 대면 벽 (맞은편)</button>
            <button id="btn-carb-2" onclick="setCarbonPos(2)">3. 환풍구 옆쪽 벽 (천장부)</button>
        </div>

        <button class="reset-btn" onclick="resetSim()">🔄 시뮬레이션 초기화</button>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:18px; color:#111;">실시간 데이터 분석</h3>
    
    <div class="chart-box">
        <div class="stat-label">공간 내 잔류 농도: <span id="particleCount" class="highlight">0</span></div>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-box">
        <div class="stat-label" style="font-weight:bold; color:#333;">누적 제거 성과</div>
        <div class="stat-label" style="margin-top:10px;">환풍구 배출: <span id="fanCount" style="color:#0288d1; font-weight:bold;">0</span></div>
        <div class="stat-label">활성탄 흡착: <span id="carbCount" style="color:#424242; font-weight:bold;">0</span></div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>
    
    <p style="font-size:11px; color:#999; line-height:1.5;">
        * 암모니아(NH₃)는 공기보다 가벼워 상층부로 확산되는 성질이 반영되어 있습니다.<br>
        * 벽면에 충돌 시 실제 기체처럼 반사각을 형성하며 튕겨 나옵니다.
    </p>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 기본 설정 ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let particles = [];
    let removedByFan = 0, removedByCarbon = 0;

    // --- 조명 ---
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.7));

    // --- 시뮬레이션 공간 (Room) ---
    const roomSize = { x: 20, y: 10, z: 15 };
    const roomGeo = new THREE.BoxGeometry(roomSize.x, roomSize.y, roomSize.z);
    const roomEdge = new THREE.LineSegments(
        new THREE.EdgesGeometry(roomGeo), 
        new THREE.LineBasicMaterial({ color: 0xcccccc })
    );
    scene.add(roomEdge);

    // --- 중앙 차단벽 (기체 흐름 방해) ---
    const wallMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.5 });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 7, 10), wallMat);
    wall.position.set(0, -1.5, 0); // 중앙 칸막이
    scene.add(wall);

    // --- 환풍구 (Fan) ---
    const fan = new THREE.Mesh(
        new THREE.CircleGeometry(1.2, 32), 
        new THREE.MeshBasicMaterial({ color: 0x03a9f4, side: THREE.DoubleSide })
    );
    fan.position.set(-9.95, 3, 0);
    fan.rotation.y = Math.PI / 2;
    scene.add(fan);

    // --- 활성탄 필터 (Carbon) ---
    const carbonGeo = new THREE.BoxGeometry(5, 0.2, 5);
    const carbonMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const carbon = new THREE.Mesh(carbonGeo, carbonMat);
    
    // 위치 옵션: 0.발생원 벽면 / 1.환풍기 대면 벽 / 2.환풍구 옆 천장
    const carbonPositions = [
        new THREE.Vector3(6, -4.8, 5),    // 발생원 쪽 바닥/벽
        new THREE.Vector3(9.8, 0, 0),     // 환풍기 대면 벽
        new THREE.Vector3(-8, 4.8, 0)     // 환풍구 옆 천장
    ];
    
    window.setCarbonPos = (idx) => {
        carbon.position.copy(carbonPositions[idx]);
        // 시각적 회전 처리
        if(idx === 1) carbon.rotation.z = Math.PI / 2;
        else carbon.rotation.z = 0;
        
        // 버튼 스타일 업데이트
        for(let i=0; i<3; i++) {
            document.getElementById(`btn-carb-${i}`).className = (i === idx) ? 'active-btn' : '';
        }
    };
    setCarbonPos(2); // 초기값: 환풍구 옆
    scene.add(carbon);

    // --- 3개의 암모니아 생성기 ---
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.7, 0.5, 16), 
            new THREE.MeshPhongMaterial({ color: 0x999999 })
        );
        s.position.set(7, -4.7, (i-1)*5); // 오른쪽 구역에 배치
        scene.add(s);
        sources.push(s);
    }

    camera.position.set(22, 14, 22);
    camera.lookAt(0, 0, 0);

    // --- 그래프 엔진 ---
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(60).fill(0);

    function updateCharts() {
        document.getElementById('particleCount').innerText = particles.length;
        document.getElementById('fanCount').innerText = removedByFan;
        document.getElementById('carbCount').innerText = removedByCarbon;

        concCtx.clearRect(0, 0, 320, 100);
        concCtx.beginPath(); concCtx.strokeStyle = '#d32f2f'; concCtx.lineWidth = 2;
        history.push(particles.length); history.shift();
        for(let i=0; i<60; i++) {
            let x = (i/60)*320, y = 100 - (history[i]/1000)*100;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        effCtx.clearRect(0, 0, 320, 100);
        const max = Math.max(removedByFan, removedByCarbon, 1);
        effCtx.fillStyle = '#03a9f4'; effCtx.fillRect(70, 100, 40, -(removedByFan/max)*80);
        effCtx.fillStyle = '#424242'; effCtx.fillRect(170, 100, 40, -(removedByCarbon/max)*80);
    }

    // --- 기체 물리 입자 엔진 ---
    const pGeo = new THREE.SphereGeometry(0.12, 6, 6);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffa000, transparent: true, opacity: 0.7 });

    function animate() {
        requestAnimationFrame(animate);

        const spawnRate = parseFloat(document.getElementById('spawnRate').value);
        const fanPower = parseFloat(document.getElementById('fanPower').value) * 0.0012;
        const carbEff = parseFloat(document.getElementById('carbEff').value) / 100;

        // 입자 생성 (암모니아 특성: 빠르게 확산)
        sources.forEach(src => {
            if(Math.random() < spawnRate/120) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.5, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.25, 0.05, (Math.random()-0.5)*0.25);
                scene.add(p);
                particles.push(p);
            }
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const vel = p.userData.vel;

            // 1. 환풍구 흡입 (기류 효과)
            const distFan = p.position.distanceTo(fan.position);
            if(distFan < 10) {
                const pull = new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(fanPower * (10/distFan));
                vel.add(pull);
            }
            if(distFan < 1.1) {
                removedByFan++; scene.remove(p); particles.splice(i, 1); continue;
            }

            // 2. 활성탄 흡착 (필터 접촉 시 확률적 제거)
            const distCarb = p.position.distanceTo(carbon.position);
            if(distCarb < 2.5 && Math.random() < carbEff * 0.2) {
                p.material.opacity -= 0.2;
                if(p.material.opacity <= 0) {
                    removedByCarbon++; scene.remove(p); particles.splice(i, 1); continue;
                }
            }

            // 3. 암모니아 물리 (부력 + 브라운 운동)
            vel.y += 0.0028; // 공기보다 가벼운 기체의 상승
            vel.x += (Math.random()-0.5)*0.02; 
            vel.z += (Math.random()-0.5)*0.02;
            p.position.add(vel);
            vel.multiplyScalar(0.985); // 공기 저항에 의한 감속

            // 4. 벽면 충돌 물리 (Reflect)
            // 중앙 칸막이 벽 충돌
            const wallBox = new THREE.Box3().setFromObject(wall);
            if(wallBox.containsPoint(p.position)) {
                vel.x *= -1; // 튕겨나감
                p.position.x += vel.x * 1.5;
            }

            // 외벽 충돌
            const lx = roomSize.x/2 - 0.2, ly = roomSize.y/2 - 0.2, lz = roomSize.z/2 - 0.2;
            if(Math.abs(p.position.x) > lx) { vel.x *= -0.8; p.position.x = Math.sign(p.position.x)*lx; }
            if(Math.abs(p.position.y) > ly) { vel.y *= -0.8; p.position.y = Math.sign(p.position.y)*ly; }
            if(Math.abs(p.position.z) > lz) { vel.z *= -0.8; p.position.z = Math.sign(p.position.z)*lz; }
        }

        updateCharts();
        renderer.render(scene, camera);
    }

    window.resetSim = () => {
        particles.forEach(p => scene.remove(p));
        particles = []; removedByFan = 0; removedByCarbon = 0;
        history.fill(0);
    };

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, window.innerHeight);
    });
</script>
</body>
</html>
