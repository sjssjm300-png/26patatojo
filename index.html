<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Ammonia Removal Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #fff; }
        #canvas-container { flex: 1; position: relative; }
        #data-panel { 
            width: 320px; background: #f8f9fa; border-left: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; z-index: 101;
        }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px; width: 230px; z-index: 100;
        }
        button { 
            cursor: pointer; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            background: #fff; font-weight: bold; font-size: 12px;
        }
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        canvas.chart-canvas { width: 100%; height: 120px; background: #fafafa; }
        .label { font-size: 13px; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <b style="color:#ff4500;">기기 및 흐름 제어</b>
        <button onclick="togglePause()">⏯ 일시정지 / 재개</button>
        <button onclick="changeFanPos()">🌀 환풍기 위치 이동</button>
        <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
        <hr style="border:0; border-top:1px solid #eee;">
        <label style="font-size:12px;">암모니아 발생량: <input type="range" id="spawnRate" min="0" max="60" value="15"></label>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:17px;">제거 효율 분석 데이터</h3>
    
    <div class="chart-container">
        <span class="label">📈 공간 내 암모니아 농도</span>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-container">
        <span class="label">📊 누적 제거 비율 (%)</span>
        <div style="font-size:11px; color:#555; margin-bottom:8px;">
            환풍기(배출): <span id="fanEff" style="color:#00aaff; font-weight:bold;">0</span>% <br>
            활성탄(흡착): <span id="carbEff" style="color:#333; font-weight:bold;">0</span>%
        </div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let isPaused = false;
    let totalGenerated = 0;
    let removedByFan = 0;
    let removedByCarbon = 0;

    // 20 x 10 x 15 화장실 공간
    const roomGeo = new THREE.BoxGeometry(20, 10, 15);
    const roomLine = new THREE.LineSegments(new THREE.EdgesGeometry(roomGeo), new THREE.LineBasicMaterial({ color: 0xcccccc }));
    scene.add(roomLine);

    // 장치 설정
    const fan = new THREE.Mesh(new THREE.CircleGeometry(1.2, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide }));
    const fanPos = [new THREE.Vector3(-9.9, 4, 0), new THREE.Vector3(9.9, 4, 0), new THREE.Vector3(0, 4, -7.4)];
    let fi = 0;
    fan.position.copy(fanPos[0]);
    fan.rotation.y = Math.PI/2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(5, 4.8, 2);
    scene.add(carbon);

    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1, 16), new THREE.MeshPhongMaterial({ color: 0x888888 }));
        s.position.set((i-1)*6, -4.5, 4);
        scene.add(s);
        sources.push(s);
    }

    // 조명 & 카메라
    scene.add(new THREE.DirectionalLight(0xffffff, 1), new THREE.AmbientLight(0xffffff, 0.7));
    camera.position.set(22, 12, 22);
    camera.lookAt(0, 0, 0);

    // 그래프 설정
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(50).fill(0);

    function updateData() {
        concCtx.clearRect(0, 0, 320, 120);
        concCtx.beginPath();
        concCtx.strokeStyle = '#ff4500';
        history.push(particles.length);
        history.shift();
        for(let i=0; i<50; i++) {
            let x = (i / 50) * 320;
            let y = 120 - (history[i] / 800) * 120;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        const fP = totalGenerated > 0 ? (removedByFan / totalGenerated) * 100 : 0;
        const cP = totalGenerated > 0 ? (removedByCarbon / totalGenerated) * 100 : 0;
        document.getElementById('fanEff').innerText = fP.toFixed(1);
        document.getElementById('carbEff').innerText = cP.toFixed(1);

        effCtx.clearRect(0, 0, 320, 120);
        effCtx.fillStyle = '#00aaff'; effCtx.fillRect(60, 120, 50, -(fP * 1.0));
        effCtx.fillStyle = '#333333'; effCtx.fillRect(160, 120, 50, -(cP * 1.0));
    }

    // 입자 시스템
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.8 });

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        const rate = parseInt(document.getElementById('spawnRate').value);
        sources.forEach(src => {
            if(Math.random() < rate/180) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.8, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.05, 0.04 + Math.random()*0.03, (Math.random()-0.5)*0.05);
                scene.add(p);
                particles.push(p);
                totalGenerated++;
            }
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 1. 환풍기 배출 로직
            const distFan = p.position.distanceTo(fan.position);
            if(distFan < 10) {
                const pull = new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(0.003 * (10 / (distFan + 1)));
                p.userData.vel.add(pull);
            }
            if(distFan < 0.9) {
                removedByFan++;
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // 2. 활성탄 흡착 로직
            const distCarb = p.position.distanceTo(carbon.position);
            if(distCarb < 2.0) {
                p.userData.vel.multiplyScalar(0.85); // 속도 급격히 감소
                p.material.opacity -= 0.04; // 서서히 흐릿해짐
                if(p.material.opacity <= 0) {
                    removedByCarbon++;
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
            }

            // 물리 엔진
            p.userData.vel.y += 0.001; // 암모니아 부력
            p.position.add(p.userData.vel);
            p.userData.vel.multiplyScalar(0.992); // 공기 저항

            // 벽면 충돌 삭제 (배출되지 못한 기체 탈출 방지)
            if (Math.abs(p.position.x) > 10 || Math.abs(p.position.y) > 5 || Math.abs(p.position.z) > 7.5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        updateData();
        renderer.render(scene, camera);
    }

    window.togglePause = () => isPaused = !isPaused;
    window.changeFanPos = () => { fi = (fi + 1) % 3; fan.position.copy(fanPos[fi]); fan.rotation.y = (fi === 2) ? 0 : Math.PI/2; };
    window.changeCarbonPos = () => { carbon.position.set((Math.random()-0.5)*16, 4.8, (Math.random()-0.5)*12); };

    animate();
</script>
</body>
</html>
