<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closed System Ammonia Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #fff; }
        #canvas-container { flex: 1; position: relative; }
        #data-panel { 
            width: 320px; background: #f8f9fa; border-left: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; z-index: 101;
        }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 12px; width: 250px; z-index: 100;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
        .ctrl-group label { font-size: 11px; font-weight: bold; color: #555; }
        button { cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-weight: bold; font-size: 11px; }
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        canvas.chart-canvas { width: 100%; height: 110px; background: #fafafa; }
        .val-display { float: right; color: #ff4500; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <b style="color:#222; font-size:14px;">🛠 시뮬레이션 환경 설정</b>
        
        <div class="ctrl-group">
            <label>암모니아 발생 강도 <span id="v-spawn" class="val-display">30</span></label>
            <input type="range" id="spawnRate" min="0" max="100" value="30" oninput="document.getElementById('v-spawn').innerText=this.value">
        </div>

        <div class="ctrl-group">
            <label>🌀 환풍구 흡입 위력 <span id="v-fan" class="val-display">5</span></label>
            <input type="range" id="fanPower" min="0" max="20" value="5" oninput="document.getElementById('v-fan').innerText=this.value">
        </div>

        <div class="ctrl-group">
            <label>⬛ 활성탄 흡착 효율 <span id="v-carb" class="val-display">50</span>%</label>
            <input type="range" id="carbEff" min="0" max="100" value="50" oninput="document.getElementById('v-carb').innerText=this.value">
        </div>

        <button onclick="changeFanPos()">🌀 환풍구 위치 변경 (벽면 3곳)</button>
        <button onclick="resetSim()" style="background:#ffeeee; border-color:#ffcccc;">🔄 데이터 리셋</button>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:17px;">실시간 분석 모니터</h3>
    
    <div class="chart-container">
        <span style="font-size:12px; font-weight:bold;">📈 공간 내 잔류 농도 (ppm)</span>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-container">
        <span style="font-size:12px; font-weight:bold;">📊 누적 제거량 비교</span>
        <div style="font-size:11px; color:#555; margin:8px 0;">
            환풍 배출: <span id="fanCount">0</span> <br>
            탄소 흡착: <span id="carbCount">0</span>
        </div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let totalGenerated = 0, removedByFan = 0, removedByCarbon = 0;
    const particles = [];

    // 20(가로) x 10(높이) x 15(폭) 밀폐 박스
    const roomGeo = new THREE.BoxGeometry(20, 10, 15);
    const roomMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee, side: THREE.BackSide, transparent: true, opacity: 0.5 });
    const room = new THREE.Mesh(roomGeo, roomMat);
    scene.add(room);

    const roomLine = new THREE.LineSegments(new THREE.EdgesGeometry(roomGeo), new THREE.LineBasicMaterial({ color: 0x444444 }));
    scene.add(roomLine);

    // 장치 설정
    const fan = new THREE.Mesh(new THREE.CircleGeometry(1.2, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide }));
    const fanPos = [new THREE.Vector3(-9.95, 3, 0), new THREE.Vector3(9.95, 3, 0), new THREE.Vector3(0, 3, -7.45)];
    let fi = 0;
    fan.position.copy(fanPos[0]);
    fan.rotation.y = Math.PI/2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 5), new THREE.MeshPhongMaterial({ color: 0x222222 }));
    carbon.position.set(5, 4.8, 0);
    scene.add(carbon);

    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 1, 16), new THREE.MeshPhongMaterial({ color: 0x666666 }));
        s.position.set((i-1)*6, -4.5, 3);
        scene.add(s);
        sources.push(s);
    }

    scene.add(new THREE.DirectionalLight(0xffffff, 1.2), new THREE.AmbientLight(0xffffff, 0.6));
    camera.position.set(22, 12, 22);
    camera.lookAt(0, 0, 0);

    // 그래프
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(60).fill(0);

    function updateCharts() {
        concCtx.clearRect(0, 0, 320, 110);
        concCtx.beginPath(); concCtx.strokeStyle = '#ff4500'; concCtx.lineWidth = 2;
        history.push(particles.length); history.shift();
        for(let i=0; i<60; i++) {
            let x = (i/60)*320, y = 110 - (history[i]/1000)*110;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        document.getElementById('fanCount').innerText = removedByFan;
        document.getElementById('carbCount').innerText = removedByCarbon;
        effCtx.clearRect(0, 0, 320, 110);
        const maxVal = Math.max(removedByFan, removedByCarbon, 1);
        effCtx.fillStyle = '#00aaff'; effCtx.fillRect(60, 110, 50, -(removedByFan/maxVal)*90);
        effCtx.fillStyle = '#222222'; effCtx.fillRect(160, 110, 50, -(removedByCarbon/maxVal)*90);
    }

    const pGeo = new THREE.SphereGeometry(0.12, 6, 6);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });

    function animate() {
        requestAnimationFrame(animate);

        // 1. 암모니아 대량 발생
        const rate = parseInt(document.getElementById('spawnRate').value);
        sources.forEach(src => {
            if(Math.random() < rate/100) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.8, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.1, 0.05 + Math.random()*0.05, (Math.random()-0.5)*0.1);
                scene.add(p);
                particles.push(p);
                totalGenerated++;
            }
        });

        const fPow = parseFloat(document.getElementById('fanPower').value) * 0.001;
        const cEff = parseFloat(document.getElementById('carbEff').value) / 100;

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 환풍구 흡입
            const dFan = p.position.distanceTo(fan.position);
            if(dFan < 8) {
                p.userData.vel.add(new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(fPow * (8/dFan)));
            }
            if(dFan < 1.0) {
                removedByFan++; scene.remove(p); particles.splice(i, 1); continue;
            }

            // 활성탄 흡착
            const dCarb = p.position.distanceTo(carbon.position);
            if(dCarb < 2.5) {
                if(Math.random() < cEff * 0.1) {
                    p.material.opacity -= 0.1;
                    p.userData.vel.multiplyScalar(0.5);
                    if(p.material.opacity <= 0) {
                        removedByCarbon++; scene.remove(p); particles.splice(i, 1); continue;
                    }
                }
            }

            // 물리 및 밀폐 공간 반사
            p.userData.vel.y += 0.0015; // 부력
            p.position.add(p.userData.vel);
            p.userData.vel.multiplyScalar(0.995);

            // 벽면 반사 (Bound check)
            if(Math.abs(p.position.x) > 9.8) { p.userData.vel.x *= -0.5; p.position.x = Math.sign(p.position.x)*9.7; }
            if(p.position.y > 4.8) { p.userData.vel.y *= -0.5; p.position.y = 4.7; }
            if(p.position.y < -4.8) { p.userData.vel.y *= -0.5; p.position.y = -4.7; }
            if(Math.abs(p.position.z) > 7.3) { p.userData.vel.z *= -0.5; p.position.z = Math.sign(p.position.z)*7.2; }
        }
        updateCharts();
        renderer.render(scene, camera);
    }

    window.changeFanPos = () => { 
        fi = (fi + 1) % 3; fan.position.copy(fanPos[fi]); 
        fan.rotation.y = (fi === 2) ? 0 : Math.PI/2;
    };
    window.resetSim = () => {
        particles.forEach(p => scene.remove(p));
        particles.length = 0; totalGenerated = 0; removedByFan = 0; removedByCarbon = 0;
        history.fill(0);
    };

    animate();
</script>
</body>
</html>
