<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammonia Diffusion Simulation - White Theme</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #fff; }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(240, 240, 240, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 12px; min-width: 250px; z-index: 100;
        }
        button { 
            cursor: pointer; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            background: #fff; color: #333; font-weight: bold;
        }
        button:hover { background: #f0f0f0; }
        button.active { background: #ff7f50; color: white; border: none; }
        label { font-size: 13px; color: #444; font-weight: 600; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #stats { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3 style="margin:0; font-size:16px;">화장실 암모니아 시뮬레이션</h3>
    <div style="display:flex; gap:5px;">
        <button id="pauseBtn" style="flex:1;" onclick="togglePause()">⏯ 일시정지</button>
    </div>
    <button onclick="changeFanPos()">🌀 환풍기 위치 변경</button>
    <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
    <hr style="border:0; border-top:1px solid #ddd;">
    <label>입자 발생 속도 <span id="rateVal">5</span></label>
    <input type="range" id="spawnRate" min="0" max="30" value="5" oninput="document.getElementById('rateVal').innerText=this.value">
    <div id="stats">
        공간: 15(W) x 10(H) x 5(D)<br>
        구조: 3개 구역 (벽면 설치)<br>
        입자 수: <span id="pCount">0</span>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let isPaused = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // 배경 흰색

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 1. 공간 및 벽면 생성
    const roomGeo = new THREE.BoxGeometry(15, 10, 5);
    const roomEdges = new THREE.EdgesGeometry(roomGeo);
    const roomLine = new THREE.LineSegments(roomEdges, new THREE.LineBasicMaterial({ color: 0xaaaaaa }));
    scene.add(roomLine);

    // 칸막이 벽 생성 (두 개의 벽)
    const wallMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, transparent: true, opacity: 0.5 });
    const wall1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 5), wallMat);
    wall1.position.set(-2, -2, 0); // 첫 번째 벽
    const wall2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 5), wallMat);
    wall2.position.set(2, -2, 0);  // 두 번째 벽
    scene.add(wall1, wall2);
    const walls = [wall1, wall2];

    // 2. 장치 설정
    // 암모니아 생성기 3개 (4만큼 거리 유지)
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 0.8, 16), new THREE.MeshPhongMaterial({ color: 0x444444 }));
        s.position.set((i - 1) * 4, -4.6, 0); // -4, 0, 4 위치
        scene.add(s);
        sources.push(s);
    }

    const fan = new THREE.Mesh(new THREE.CircleGeometry(0.7, 32), new THREE.MeshBasicMaterial({ color: 0x0077ff, side: THREE.DoubleSide }));
    fan.position.set(0, 4.9, 0);
    fan.rotation.x = Math.PI / 2;
    scene.add(fan);

    const carbon = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 2), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(5, -4.8, 0);
    scene.add(carbon);

    // 장치 위치 변경 제어
    const fPositions = [new THREE.Vector3(0, 4.9, 0), new THREE.Vector3(6, 4.9, 2), new THREE.Vector3(-6, 4.9, -2)];
    let fi = 0;
    window.changeFanPos = () => { fi = (fi+1)%3; fan.position.copy(fPositions[fi]); };
    window.changeCarbonPos = () => { 
        carbon.position.set((Math.random()-0.5)*12, -4.8, (Math.random()-0.5)*4); 
    };
    window.togglePause = () => { isPaused = !isPaused; document.getElementById('pauseBtn').classList.toggle('active'); };

    // 조명
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 7.5);
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.8));

    camera.position.set(12, 8, 14);
    camera.lookAt(0, -1, 0);

    // 3. 입자 시스템
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffa500 }); // 주황색 암모니아

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        // 생성
        const rate = parseInt(document.getElementById('spawnRate').value);
        if(rate > 0) {
            sources.forEach(src => {
                for(let i=0; i<rate/3; i++) {
                    const p = new THREE.Mesh(pGeo, pMat.clone());
                    p.position.copy(src.position).add(new THREE.Vector3(0, 0.5, 0));
                    p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.04, 0.03 + Math.random()*0.05, (Math.random()-0.5)*0.04);
                    scene.add(p);
                    particles.push(p);
                }
            });
        }

        // 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 물리: 부력 및 확산
            p.userData.vel.y += 0.001; 
            const nextPos = p.position.clone().add(p.userData.vel);

            // 벽 충돌 체크
            let hitWall = false;
            walls.forEach(w => {
                const b = new THREE.Box3().setFromObject(w);
                if(b.containsPoint(nextPos)) {
                    p.userData.vel.x *= -0.5; // 반사
                    hitWall = true;
                }
            });

            if(!hitWall) p.position.copy(nextPos);
            p.userData.vel.multiplyScalar(0.99);

            // 환풍기 흡입
            if (p.position.distanceTo(fan.position) < 0.8) {
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // 활성탄 흡착
            if (p.position.distanceTo(carbon.position) < 1.2) {
                p.material.opacity -= 0.05;
                if(p.material.opacity <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
            }

            // 경계 소멸
            if (Math.abs(p.position.x) > 7.5 || Math.abs(p.position.y) > 5 || Math.abs(p.position.z) > 2.5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        document.getElementById('pCount').innerText = particles.length;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
