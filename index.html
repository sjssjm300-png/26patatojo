<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Toilet Simulation (20x10x15)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #fff; }
        #canvas-container { flex: 1; position: relative; }
        #data-panel { 
            width: 320px; background: #f8f9fa; border-left: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; z-index: 101;
        }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px; width: 230px; z-index: 100;
        }
        button { 
            cursor: pointer; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            background: #fff; font-weight: bold; font-size: 12px; transition: 0.2s;
        }
        button:hover { background: #f0f0f0; }
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        canvas.chart-canvas { width: 100%; height: 120px; background: #fafafa; }
        .label { font-size: 13px; font-weight: bold; margin-bottom: 5px; display: block; color: #333; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <b style="color:#ff4500; font-size:15px;">설계 및 제어</b>
        <button onclick="togglePause()">⏯ 시뮬레이션 정지/재개</button>
        <button onclick="changeFanPos()">🌀 환풍기 벽면 이동</button>
        <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
        <hr style="border:0; border-top:1px solid #eee;">
        <label style="font-size:12px;">암모니아 발생량: <input type="range" id="spawnRate" min="0" max="50" value="15"></label>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:17px;">실시간 분석 모니터</h3>
    <div id="stats" style="font-size:12px; color:#666;">공간 규격: 20m x 10m x 15m</div>
    
    <div class="chart-container">
        <span class="label">📈 암모니아 농도 추이</span>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-container">
        <span class="label">📊 장치별 제거 효율 (%)</span>
        <div style="font-size:11px; color:#555; margin-bottom:8px;">
            환풍기 흡입: <span id="fanEff" style="color:#00aaff; font-weight:bold;">0</span>% <br>
            활성탄 흡착: <span id="carbEff" style="color:#333; font-weight:bold;">0</span>%
        </div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // === 기본 설정 ===
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let isPaused = false;
    let totalGenerated = 0;
    let removedByFan = 0;
    let removedByCarbon = 0;

    // === 20 x 10 x 15 공간 모델링 ===
    // 가로(X): 20, 높이(Y): 10, 폭(Z): 15
    const roomGeo = new THREE.BoxGeometry(20, 10, 15);
    const roomLine = new THREE.LineSegments(new THREE.EdgesGeometry(roomGeo), new THREE.LineBasicMaterial({ color: 0xbbbbbb }));
    scene.add(roomLine);

    // 내부 구조물 (세면대 구역)
    const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 4), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
    counter.position.set(-6, -1, -5.5);
    scene.add(counter);

    // 칸막이 벽 (3구역 분리)
    const wallGeo = new THREE.BoxGeometry(0.1, 7, 6);
    const wallMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, transparent: true, opacity: 0.3 });
    const wall1 = new THREE.Mesh(wallGeo, wallMat); wall1.position.set(-3, -1.5, 3);
    const wall2 = new THREE.Mesh(wallGeo, wallMat); wall2.position.set(3, -1.5, 3);
    scene.add(wall1, wall2);

    // === 장치 배치 ===
    // 벽면 환풍기 위치 (좌, 우, 중앙 벽면 상층)
    const fan = new THREE.Mesh(new THREE.CircleGeometry(1.0, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide }));
    const fanPositions = [
        { pos: new THREE.Vector3(-9.9, 4, 0), rot: [0, Math.PI/2, 0] },
        { pos: new THREE.Vector3(9.9, 4, 0), rot: [0, -Math.PI/2, 0] },
        { pos: new THREE.Vector3(0, 4, -7.4), rot: [0, 0, 0] }
    ];
    let fi = 0;
    function setFan() {
        fan.position.copy(fanPositions[fi].pos);
        fan.rotation.set(...fanPositions[fi].rot);
    }
    setFan();
    scene.add(fan);
    window.changeFanPos = () => { fi = (fi + 1) % 3; setFan(); };

    // 활성탄 필터 (상단 벽 고정)
    const carbon = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 4), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(6, 4.8, 2);
    scene.add(carbon);
    window.changeCarbonPos = () => { 
        carbon.position.x = (Math.random() - 0.5) * 16;
        carbon.position.z = (Math.random() - 0.5) * 10;
    };

    // 암모니아 생성기 (변기 3곳)
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.2, 16), new THREE.MeshPhongMaterial({ color: 0x888888 }));
        s.position.set((i-1)*6, -4.4, 4); // X축 간격 6m, Z축 깊이 4m 지점
        scene.add(s);
        sources.push(s);
    }

    // === 조명 및 카메라 ===
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(10, 10, 10);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.7));
    camera.position.set(20, 12, 22);
    camera.lookAt(0, 0, 0);

    // === 그래프 로직 ===
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(50).fill(0);

    function drawCharts() {
        concCtx.clearRect(0, 0, 320, 120);
        concCtx.beginPath();
        concCtx.strokeStyle = '#ff4500';
        concCtx.lineWidth = 2;
        history.push(particles.length);
        history.shift();
        for(let i=0; i<50; i++) {
            let x = (i / 50) * 320;
            let y = 120 - (history[i] / 600) * 120;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        const fPerc = totalGenerated > 0 ? (removedByFan / totalGenerated) * 100 : 0;
        const cPerc = totalGenerated > 0 ? (removedByCarbon / totalGenerated) * 100 : 0;
        document.getElementById('fanEff').innerText = fPerc.toFixed(1);
        document.getElementById('carbEff').innerText = cPerc.toFixed(1);

        effCtx.clearRect(0, 0, 320, 120);
        effCtx.fillStyle = '#00aaff'; effCtx.fillRect(60, 120, 50, -(fPerc * 1.0));
        effCtx.fillStyle = '#333333'; effCtx.fillRect(160, 120, 50, -(cPerc * 1.0));
    }

    // === 입자 시스템 ===
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.7 });

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        const rate = parseInt(document.getElementById('spawnRate').value);
        sources.forEach(src => {
            if(Math.random() < rate/150) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.8, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.06, 0.05 + Math.random()*0.05, (Math.random()-0.5)*0.06);
                scene.add(p);
                particles.push(p);
                totalGenerated++;
            }
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 공기 흐름 (환풍기 방향 인력)
            const dirToFan = new THREE.Vector3().subVectors(fan.position, p.position).normalize();
            if(p.position.distanceTo(fan.position) < 10) {
                p.userData.vel.add(dirToFan.multiplyScalar(0.0025));
            }

            p.userData.vel.y += 0.0012; // 암모니아 부력
            p.position.add(p.userData.vel);
            p.userData.vel.multiplyScalar(0.99);

            // 흡입 및 흡착
            if (p.position.distanceTo(fan.position) < 1.0) {
                removedByFan++;
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }
            if (p.position.distanceTo(carbon.position) < 2.5) {
                p.material.opacity -= 0.04;
                if(p.material.opacity <= 0) {
                    removedByCarbon++;
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
            }

            // 경계 삭제
            if (Math.abs(p.position.x) > 10 || Math.abs(p.position.y) > 5 || Math.abs(p.position.z) > 7.5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        drawCharts();
        renderer.render(scene, camera);
    }

    window.togglePause = () => isPaused = !isPaused;
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, window.innerHeight);
    });
</script>
</body>
</html>
