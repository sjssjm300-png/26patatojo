<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Ammonia Flow Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; }
        #canvas-container { flex: 1; position: relative; }
        #data-panel { 
            width: 350px; background: #fdfdfd; border-left: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto;
        }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px; width: 220px;
        }
        button { 
            cursor: pointer; padding: 8px; border: 1px solid #ccc; border-radius: 5px; 
            background: #fff; font-weight: bold; font-size: 12px;
        }
        button:hover { background: #f0f0f0; }
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        canvas.chart-canvas { width: 100%; height: 150px; background: #fafafa; }
        .label { font-size: 13px; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <b style="color:#ff4500;">Control Panel</b>
        <button onclick="togglePause()">⏯ 정지/재개</button>
        <button onclick="changeFanPos()">🌀 환풍기 벽면 이동 (좌/중/우)</button>
        <button onclick="changeCarbonPos()">⬛ 활성탄 위치 변경</button>
        <hr style="border:0; border-top:1px solid #eee;">
        <label style="font-size:12px;">발생량: <input type="range" id="spawnRate" min="0" max="40" value="10"></label>
    </div>
</div>

<div id="data-panel">
    <h3 style="margin:0; font-size:18px;">실시간 분석 데이터</h3>
    
    <div class="chart-container">
        <span class="label">📈 암모니아 농도 추이</span>
        <canvas id="concChart" class="chart-canvas"></canvas>
    </div>

    <div class="chart-container">
        <span class="label">📊 제거 효율 비교 (%)</span>
        <div style="font-size:12px; color:#666; margin-bottom:10px;">
            환풍기 효율: <span id="fanEff">0</span>% <br>
            활성탄 효율: <span id="carbEff">0</span>%
        </div>
        <canvas id="effChart" class="chart-canvas"></canvas>
    </div>

    <div style="font-size: 11px; color: #888; line-height: 1.4;">
        * 농도는 공간 내 총 입자 수를 기반으로 계산됩니다.<br>
        * 효율은 누적 발생량 대비 각 장치의 제거량을 나타냅니다.
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // === 기본 설정 ===
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let isPaused = false;
    let totalGenerated = 0;
    let removedByFan = 0;
    let removedByCarbon = 0;

    // === 화장실 모델링 (가로 20, 높이 10, 폭 8) ===
    const roomGeo = new THREE.BoxGeometry(20, 10, 8);
    const roomLine = new THREE.LineSegments(new THREE.EdgesGeometry(roomGeo), new THREE.LineBasicMaterial({ color: 0xcccccc }));
    scene.add(roomLine);

    // 세면대 구역 모델링
    const sinkCounter = new THREE.Mesh(new THREE.BoxGeometry(6, 0.5, 3), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
    sinkCounter.position.set(-7, -1, -2.5);
    scene.add(sinkCounter);

    // 벽면 환풍기 위치 (좌 벽, 우 벽, 뒷 벽 상단)
    const fan = new THREE.Mesh(new THREE.CircleGeometry(0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff, side: THREE.DoubleSide }));
    const fanPositions = [
        { pos: new THREE.Vector3(-9.9, 4, 0), rot: [0, Math.PI/2, 0] },  // 좌측 벽
        { pos: new THREE.Vector3(9.9, 4, 0), rot: [0, -Math.PI/2, 0] }, // 우측 벽
        { pos: new THREE.Vector3(0, 4, -3.9), rot: [0, 0, 0] }          // 중앙 뒷 벽
    ];
    let fi = 0;
    function setFan() {
        fan.position.copy(fanPositions[fi].pos);
        fan.rotation.set(...fanPositions[fi].rot);
    }
    setFan();
    scene.add(fan);
    window.changeFanPos = () => { fi = (fi + 1) % 3; setFan(); };

    // 활성탄 (상단 벽 고정 필터)
    const carbon = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 3), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    carbon.position.set(5, 4.8, 0);
    scene.add(carbon);
    window.changeCarbonPos = () => { carbon.position.x = (Math.random() - 0.5) * 15; };

    // 발생기(변기 위치 3곳)
    const sources = [];
    for(let i=0; i<3; i++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1, 16), new THREE.MeshPhongMaterial({ color: 0x888888 }));
        s.position.set(i*5 - 2, -4.5, 1);
        scene.add(s);
        sources.push(s);
    }

    // === 조명 및 카메라 ===
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.8));
    camera.position.set(18, 10, 18);
    camera.lookAt(0, 0, 0);

    // === 그래프 데이터 관리 ===
    const concCtx = document.getElementById('concChart').getContext('2d');
    const effCtx = document.getElementById('effChart').getContext('2d');
    let history = new Array(50).fill(0);

    function drawCharts() {
        // 농도 그래프
        concCtx.clearRect(0, 0, 350, 150);
        concCtx.beginPath();
        concCtx.strokeStyle = '#ff4500';
        history.push(particles.length);
        history.shift();
        for(let i=0; i<50; i++) {
            let x = (i / 50) * 350;
            let y = 150 - (history[i] / 500) * 150;
            if(i===0) concCtx.moveTo(x, y); else concCtx.lineTo(x, y);
        }
        concCtx.stroke();

        // 효율 막대 그래프
        const fPerc = totalGenerated > 0 ? (removedByFan / totalGenerated) * 100 : 0;
        const cPerc = totalGenerated > 0 ? (removedByCarbon / totalGenerated) * 100 : 0;
        document.getElementById('fanEff').innerText = fPerc.toFixed(1);
        document.getElementById('carbEff').innerText = cPerc.toFixed(1);

        effCtx.clearRect(0, 0, 350, 150);
        effCtx.fillStyle = '#00aaff'; effCtx.fillRect(50, 150, 60, -(fPerc * 1.5));
        effCtx.fillStyle = '#333333'; effCtx.fillRect(150, 150, 60, -(cPerc * 1.5));
    }

    // === 입자 물리 시스템 ===
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffa500, transparent: true, opacity: 0.7 });

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        const rate = parseInt(document.getElementById('spawnRate').value);
        sources.forEach(src => {
            if(Math.random() < rate/100) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.copy(src.position).add(new THREE.Vector3(0, 0.7, 0));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.05, 0.04 + Math.random()*0.04, (Math.random()-0.5)*0.05);
                scene.add(p);
                particles.push(p);
                totalGenerated++;
            }
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            
            // 1. 공기 흐름 유도 (환풍기 방향으로 부드럽게 가속)
            const dirToFan = new THREE.Vector3().subVectors(fan.position, p.position).normalize();
            const distToFan = p.position.distanceTo(fan.position);
            if(distToFan < 8) {
                p.userData.vel.add(dirToFan.multiplyScalar(0.002));
            }

            // 2. 물리 이동
            p.userData.vel.y += 0.001; // 부력
            p.position.add(p.userData.vel);
            p.userData.vel.multiplyScalar(0.99);

            // 3. 제거 로직
            if (distToFan < 0.8) {
                removedByFan++;
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            if (p.position.distanceTo(carbon.position) < 2.0) {
                p.material.opacity -= 0.05;
                if(p.material.opacity <= 0) {
                    removedByCarbon++;
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
            }

            // 경계 삭제
            if (Math.abs(p.position.x) > 10 || Math.abs(p.position.y) > 5 || Math.abs(p.position.z) > 4) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        drawCharts();
        renderer.render(scene, camera);
    }

    window.togglePause = () => isPaused = !isPaused;
    animate();
</script>
</body>
</html>
