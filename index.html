<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Ammonia Simulation Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; display: flex; background: #ffffff; color: #333; height: 100vh; }
        #canvas-container { flex: 1; position: relative; background: #fff; }
        
        /* 우측 데이터 패널 */
        #data-panel { 
            width: 350px; background: #fdfdfd; border-left: 1px solid #eee; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        /* 제어 패널 */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 18px;
            border-radius: 12px; border: 1px solid #ddd;
            display: flex; flex-direction: column; gap: 8px; width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 100;
        }

        .input-group { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: bold; }
        input[type="number"] { width: 50px; padding: 3px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

        .btn-loc { cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 11px; margin-bottom: 4px; width: 100%; text-align: left; transition: 0.2s;}
        .active-loc { background: #e3f2fd; border-color: #2196f3; color: #1976d2; font-weight: bold; }

        .monitor-card { background: #fff; border: 1px solid #f0f0f0; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .ppm-display { font-size: 36px; font-weight: 800; color: #d32f2f; margin: 5px 0; }
        
        /* 프로그레스 바 */
        .eff-bar-bg { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; display: flex; margin: 10px 0; }
        #bar-fan { background: #03a9f4; height: 100%; transition: width 0.3s; }
        #bar-carb { background: #444; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-size:15px; color:#111;">🧪 역동적 물리 엔진 제어</h3>
        <div class="input-group">암모니아 발생량 <input type="number" id="spawnRate" value="60"></div>
        <div class="input-group">환풍기 위력 <input type="number" id="fanPower" value="18"></div>
        <div class="input-group">활성탄 흡착 효율 (%) <input type="number" id="carbEff" value="75"></div>
        
        <div style="margin-top:12px;">
            <p style="font-size:11px; font-weight:bold; color:#1976d2; margin-bottom:6px;">⬛ 활성탄 필터 위치</p>
            <button id="loc0" class="btn-loc" onclick="updateCarbonPos(0)">📍 발생원 상단 벽면</button>
            <button id="loc1" class="btn-loc" onclick="updateCarbonPos(1)">📍 환풍기 맞은편 벽면</button>
            <button id="loc2" class="btn-loc active-loc" onclick="updateCarbonPos(2)">📍 환풍구 바로 옆 (천장)</button>
        </div>
        <button onclick="resetData()" style="width:100%; padding:10px; margin-top:10px; background:#fff; border:1px solid #ffcdd2; color:#d32f2f; cursor:pointer; border-radius:8px; font-weight:bold; font-size:11px;">🔄 시뮬레이션 초기화</button>
    </div>
</div>

<div id="data-panel">
    <h2 style="margin:0; font-size:20px; color:#111;">분석 리포트</h2>
    
    <div class="monitor-card">
        <div style="font-size:13px; color:#666; font-weight:600;">실시간 농도 (PPM)</div>
        <div class="ppm-display" id="ppmText">0.0</div>
        <div style="font-size:11px; color:#999;">* 입자 밀도 기반 환산 수치</div>
    </div>

    <div class="monitor-card">
        <div style="font-size:13px; color:#666; font-weight:600;">누적 제거 기여도 (%)</div>
        <div class="eff-bar-bg">
            <div id="bar-fan" style="width:50%;"></div>
            <div id="bar-carb" style="width:50%;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
            <span style="color:#03a9f4;">🌀 환풍구: <span id="txt-fan">50</span>%</span>
            <span style="color:#333;">⬛ 활성탄: <span id="txt-carb">50</span>%</span>
        </div>
    </div>
</div>

<script>
    // --- 초기 변수 ---
    let scene, camera, renderer, particles = [];
    let removedFan = 0, removedCarb = 0;
    let fan, carbon, sources = [], wall;

    function init() {
        const container = document.getElementById('canvas-container');
        
        // Scene & Camera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(60, container.clientWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(22, 15, 22);
        camera.lookAt(0, 0, 0);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.3);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Room (Box Outline)
        const roomGeo = new THREE.BoxGeometry(20, 10, 15);
        const roomEdge = new THREE.LineSegments(
            new THREE.EdgesGeometry(roomGeo),
            new THREE.LineBasicMaterial({ color: 0xdddddd })
        );
        scene.add(roomEdge);

        // 중앙 칸막이
        wall = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 7, 10),
            new THREE.MeshPhongMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.2 }) // 더 투명하게
        );
        wall.position.set(0, -1.5, 0);
        scene.add(wall);

        // 환풍구 (Fan)
        fan = new THREE.Mesh(
            new THREE.CircleGeometry(1.2, 32),
            new THREE.MeshBasicMaterial({ color: 0x03a9f4, side: THREE.DoubleSide })
        );
        fan.position.set(-9.95, 3.5, 0);
        fan.rotation.y = Math.PI / 2;
        scene.add(fan);

        // 활성탄 (Carbon)
        carbon = new THREE.Mesh(
            new THREE.BoxGeometry(5, 0.2, 5),
            new THREE.MeshPhongMaterial({ color: 0x444444 })
        );
        scene.add(carbon);
        updateCarbonPos(2); // 초기 위치: 천장

        // 발생기 (Sources) 3개
        for(let i=0; i<3; i++) {
            const s = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.6, 0.3, 16),
                new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
            );
            s.position.set(7, -4.8, (i-1)*5);
            scene.add(s);
            sources.push(s);
        }

        animate();
    }

    // 활성탄 위치 변경 함수
    window.updateCarbonPos = function(idx) {
        const locs = [
            { pos: [7, 3, 5], rot: 0 },       // 발생원 벽
            { pos: [9.8, 0, 0], rot: Math.PI/2 }, // 환풍기 맞은편
            { pos: [-8, 4.8, 0], rot: 0 }     // 환풍기 옆 천장
        ];
        carbon.position.set(...locs[idx].pos);
        carbon.rotation.z = locs[idx].rot;

        for(let i=0; i<3; i++) {
            document.getElementById('loc' + i).className = (i === idx) ? 'btn-loc active-loc' : 'btn-loc';
        }
    };

    function resetData() {
        particles.forEach(p => scene.remove(p));
        particles = [];
        removedFan = 0; removedCarb = 0;
    }

    function animate() {
        requestAnimationFrame(animate);

        const spawnRate = parseFloat(document.getElementById('spawnRate').value);
        const fanPower = parseFloat(document.getElementById('fanPower').value) * 0.0009; // 인력 살짝 강화
        const carbEff = parseFloat(document.getElementById('carbEff').value) / 100;

        // --- 입자 생성 (핵심 수정: 무작위성 강화) ---
        if(Math.random() < spawnRate/100) {
            const s = sources[Math.floor(Math.random()*3)];
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffa000, transparent: true, opacity: 0.5 }) // 색상 변경
            );
            p.position.copy(s.position).add(new THREE.Vector3(0, 0.5, 0));
            
            // 핵심 수정: 초기 속도를 위쪽뿐만 아니라 사방팔방으로 강하게 터지도록 설정 (X, Z 무작위성 대폭 강화)
            p.userData.vel = new THREE.Vector3(
                (Math.random()-0.5)*0.6, // 가로 무작위 폭발
                0.02 + Math.random()*0.1, // 위쪽 기본 속도
                (Math.random()-0.5)*0.6  // 앞뒤 무작위 폭발
            );
            scene.add(p);
            particles.push(p);
        }

        // --- 입자 물리 업데이트 (역동성 강화) ---
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const v = p.userData.vel;

            // 1. 제거 판정
            if(p.position.distanceTo(fan.position) < 1.1) {
                removedFan++; scene.remove(p); particles.splice(i, 1); continue;
            }
            if(p.position.distanceTo(carbon.position) < 2.5 && Math.random() < carbEff * 0.1) {
                p.material.opacity -= 0.15;
                if(p.material.opacity <= 0) { removedCarb++; scene.remove(p); particles.splice(i, 1); continue; }
            }

            // 2. 물리 밸런스 조정 (위로만 가는 경향 완화)
            v.y += 0.0011; // 부력 살짝 낮춤 (천장 정체 완화)
            v.x += (Math.random()-0.5)*0.035; // 무작위 확산 강화 (불규칙한 움직임)
            v.z += (Math.random()-0.5)*0.035;
            
            // 3. 환풍기 인력
            const d = p.position.distanceTo(fan.position);
            if(d < 9) v.add(new THREE.Vector3().subVectors(fan.position, p.position).normalize().multiplyScalar(fanPower * (9/d)));

            p.position.add(v);
            v.multiplyScalar(0.985); // 공기 저항 (속도 감쇄)

            // 4. 벽 충돌 (탄성 계수 최적화 - 골고루 튕기게)
            const lx=9.8, ly=4.8, lz=7.3;
            if(Math.abs(p.position.x)>lx) { v.x *= -0.35; p.position.x=Math.sign(p.position.x)*lx; }
            if(Math.abs(p.position.y)>ly) { v.y *= -0.35; p.position.y=Math.sign(p.position.y)*ly; }
            if(Math.abs(p.position.z)>lz) { v.z *= -0.35; p.position.z=Math.sign(p.position.z)*lz; }
            
            const wallBox = new THREE.Box3().setFromObject(wall);
            if(wallBox.containsPoint(p.position)) { v.x *= -0.35; p.position.x += v.x*2; }
        }

        // 데이터 UI 업데이트
        document.getElementById('ppmText').innerText = (particles.length * 0.04).toFixed(1);
        const total = removedFan + removedCarb || 1;
        const fPerc = Math.round((removedFan/total)*100);
        document.getElementById('bar-fan').style.width = fPerc + "%";
        document.getElementById('bar-carb').style.width = (100-fPerc) + "%";
        document.getElementById('txt-fan').innerText = fPerc;
        document.getElementById('txt-carb').innerText = 100-fPerc;

        renderer.render(scene, camera);
    }

    // 화면 크기 조정 대응
    window.addEventListener('resize', () => {
        const container = document.getElementById('canvas-container');
        camera.aspect = container.clientWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, window.innerHeight);
    });

    // 시작
    window.onload = init;
</script>
</body>
</html>
