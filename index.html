<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammonia Simulation - Toilet Model</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #000; }
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.9); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 12px; min-width: 200px;
            z-index: 100;
        }
        h3 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        button { 
            cursor: pointer; padding: 10px; border: none; 
            border-radius: 6px; background: #4a90e2; color: white;
            font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #357abd; }
        button.source { background: #e74c3c; }
        button.fan { background: #3498db; }
        button.carbon { background: #2c3e50; }
        label { font-size: 13px; color: #666; display: flex; justify-content: space-between; }
        input[type="range"] { cursor: pointer; width: 100%; }
        #stats { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3>시뮬레이션 설정</h3>
    <div class="control-group">
        <button class="source" onclick="changeSourcePos()">📍 발생 장치 이동</button>
        <button class="fan" onclick="changeFanPos()">🌀 환풍기 이동</button>
        <button class="carbon" onclick="changeCarbonPos()">⬛ 활성탄 이동</button>
    </div>
    <hr style="border:0; border-top:1px solid #ddd; width:100%;">
    <div class="control-group">
        <label>입자 발생량 <span id="rateVal">2</span></label>
        <input type="range" id="spawnRate" min="0" max="15" value="2" oninput="document.getElementById('rateVal').innerText=this.value">
    </div>
    <div id="stats">현재 입자 수: <span id="pCount">0</span></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. Scene & Camera Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Objects (Room, Source, Fan, Carbon)
    const roomGeo = new THREE.BoxGeometry(10, 8, 10);
    const roomMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
    const room = new THREE.Mesh(roomGeo, roomMat);
    scene.add(room);

    // Room Edges (Wireframe)
    const edges = new THREE.EdgesGeometry(roomGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x444444 }));
    scene.add(line);

    const source = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xff4444 }));
    const fan = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 0.2), new THREE.MeshBasicMaterial({ color: 0x44aaff }));
    const carbon = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 2.5), new THREE.MeshBasicMaterial({ color: 0x555555 }));
    scene.add(source, fan, carbon);

    // Positions (3 options for each)
    const sPos = [new THREE.Vector3(-4, -3.8, 0), new THREE.Vector3(0, -3.8, 4), new THREE.Vector3(4, -3.8, -4)];
    const fPos = [new THREE.Vector3(0, 3.8, 4), new THREE.Vector3(4, 3.8, 0), new THREE.Vector3(-4, 2, 0)];
    const cPos = [new THREE.Vector3(0, -3.8, 0), new THREE.Vector3(3, -3.8, 3), new THREE.Vector3(-3, -3.8, -3)];

    let si = 0, fi = 0, ci = 0;
    source.position.copy(sPos[0]);
    fan.position.copy(fPos[0]);
    carbon.position.copy(cPos[0]);

    window.changeSourcePos = () => { si = (si+1)%3; source.position.copy(sPos[si]); };
    window.changeFanPos = () => { fi = (fi+1)%3; fan.position.copy(fPos[fi]); };
    window.changeCarbonPos = () => { ci = (ci+1)%3; carbon.position.copy(cPos[ci]); };

    // Lighting
    const light = new THREE.PointLight(0xffffff, 150);
    light.position.set(5, 5, 5);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.4));

    camera.position.set(10, 7, 10);
    camera.lookAt(0, 0, 0);

    // 3. Particle System
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.06);
    const pMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.8 });

    function animate() {
        requestAnimationFrame(animate);

        // Spawn
        const rate = parseInt(document.getElementById('spawnRate').value);
        for(let i=0; i<rate; i++) {
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.copy(source.position);
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.12, Math.random()*0.1, (Math.random()-0.5)*0.12);
            scene.add(p);
            particles.push(p);
        }

        // Update
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.position.add(p.userData.vel);

            // Fan Interaction
            if (p.position.distanceTo(fan.position) < 1.2) {
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }

            // Carbon Interaction (Slow down & Fade)
            if (p.position.distanceTo(carbon.position) < 1.5) {
                p.userData.vel.multiplyScalar(0.9);
                p.material.opacity -= 0.01;
            }

            // Wall Bounce/Removal
            if (Math.abs(p.position.x) > 5 || Math.abs(p.position.y) > 4 || Math.abs(p.position.z) > 5) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
        document.getElementById('pCount').innerText = particles.length;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
