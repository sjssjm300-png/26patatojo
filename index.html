<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암모니아 흡착 및 확산 제어 시스템</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #2ecc71; padding-bottom: 10px; color: #27ae60; }
        
        .status-panel { display: flex; justify-content: space-between; margin: 20px 0; }
        .card { flex: 1; padding: 15px; margin: 5px; background: #e8f5e9; border-radius: 10px; text-align: center; }
        .card h3 { margin: 0; font-size: 14px; color: #666; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0; color: #2e7d32; }

        .control-panel { text-align: center; margin-top: 20px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; margin: 5px; }
        .btn-connect { background: #3498db; color: white; }
        .btn-open { background: #e67e22; color: white; }
        .btn-close { background: #95a5a6; color: white; }
        button:hover { opacity: 0.8; }

        #dataLog { width: 100%; height: 200px; background: #2c3e50; color: #ecf0f1; border-radius: 8px; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ammonia Diffusion Control System</h2>
    
    <div class="status-panel">
        <div class="card">
            <h3>현재 전압 (필터 적용)</h3>
            <p id="voltVal">0.00 V</p>
        </div>
        <div class="card">
            <h3>흡착 효율 (Rs/Ro)</h3>
            <p id="ratioVal">0.00</p>
        </div>
        <div class="card">
            <h3>출입구 상태</h3>
            <p id="gateStatus">CLOSED</p>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-connect" onclick="connectSerial()">아두이노 연결</button>
        <button class="btn-open" onclick="sendCommand('O')">출입구 열기 (Open)</button>
        <button class="btn-close" onclick="sendCommand('C')">출입구 닫기 (Close)</button>
    </div>

    <div id="dataLog">시스템 메시지: 아두이노를 연결해주세요...</div>
</div>

<script>
    let port;
    let reader;
    let writer;
    let alpha = 0.1; // 기체 요동 방지를 위한 EMA 필터 계수
    let filteredVolt = 0;

    async function connectSerial() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            const textEncoder = new TextEncoderStream();
            const writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
            writer = textEncoder.writable.getWriter();

            document.getElementById('dataLog').innerHTML += "<br>▶ 아두이노 연결 성공!";
            readData();
        } catch (e) {
            console.error(e);
            alert("연결 실패: 크롬 브라우저를 사용하거나 포트를 확인하세요.");
        }
    }

    async function readData() {
        const textDecoder = new TextDecoderStream();
        const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
        reader = textDecoder.readable.getReader();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
                // 아두이노에서 보낸 Raw 데이터를 필터링
                let rawVolt = parseFloat(value);
                if (!isNaN(rawVolt)) {
                    // EMA 필터: 방방 뛰는 기체 데이터 안정화
                    filteredVolt = (rawVolt * alpha) + (filteredVolt * (1 - alpha));
                    updateUI(filteredVolt);
                }
            }
        }
    }

    function updateUI(volt) {
        document.getElementById('voltVal').innerText = volt.toFixed(2) + " V";
        // 간이 Rs/Ro 계산 (실험 기준값 반영)
        let ratio = (5.0 / (volt + 0.001)) - 1; 
        document.getElementById('ratioVal').innerText = ratio.toFixed(2);
        
        let log = document.getElementById('dataLog');
        log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] 전압: ${volt.toFixed(2)}V`;
        log.scrollTop = log.scrollHeight;
    }

    async function sendCommand(cmd) {
        if (writer) {
            await writer.write(cmd);
            document.getElementById('gateStatus').innerText = (cmd === 'O') ? "OPEN" : "CLOSED";
            document.getElementById('dataLog').innerHTML += `<br>명령 전송: ${cmd === 'O' ? '문 열기' : '문 닫기'}`;
        }
    }
</script>

</body>
</html>
